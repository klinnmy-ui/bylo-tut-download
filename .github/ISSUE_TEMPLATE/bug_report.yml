name: Ошибка
description: Сообщить о воспроизводимой проблеме
title: "[Ошибка]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Спасибо за сообщение. Не прикладывайте личные фотографии, точные координаты,
        локальные URI, базы, JSON-экспорты, ключи и токены. На снимках экрана закройте личные данные.
  - type: dropdown
    id: platform
    attributes:
      label: Платформа
      options:
        - Android
        - Windows
        - Web / PWA
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Версия приложения
      placeholder: Например, 0.3.0-debug или web/PWA от 20.07.2026
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Описание
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Что произошло
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Устройство и версия ОС
      placeholder: Например, Samsung A54 / Android 15 или Windows 11 24H2
  - type: dropdown
    id: frequency
    attributes:
      label: Как часто повторяется
      options:
        - Всегда
        - Иногда
        - Произошло один раз
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Дополнительные сведения
      description: Необязательный обезличенный снимок экрана или текст ошибки. Не добавляйте фотографии и точные координаты.
  - type: checkboxes
    id: privacy
    attributes:
      label: Проверка приватности
      options:
        - label: Я не добавил личные фото, точные координаты, локальные URI, базы, JSON-экспорты, ключи и токены.
          required: true
