name: Предложение
description: Предложить улучшение
title: "[Предложение]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Опишите задачу и желаемый результат. Не прикладывайте личные фотографии,
        точные координаты, базы, JSON-экспорты, ключи и токены.
  - type: dropdown
    id: platform
    attributes:
      label: Где нужно улучшение
      options:
        - Android
        - Windows
        - Web / PWA
        - Все версии
        - Документация и установка
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Какая проблема решается
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Предлагаемое решение
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Какой результат будет полезен
  - type: checkboxes
    id: privacy
    attributes:
      label: Проверка приватности
      options:
        - label: Я не добавил личные фото, точные координаты, базы, JSON-экспорты, ключи и токены.
          required: true
